name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run check

      - name: Unit and integration tests
        run: npm test

      - name: Pack/install smoke
        run: bun test tests/packaging.test.ts
